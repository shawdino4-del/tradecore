<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background:#020617;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box {
            background:#0f172a;
            padding:30px;
            border-radius:15px;
            width:320px;
            text-align:center;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:none;
        }

        button {
            width:100%;
            padding:12px;
            background:#22c55e;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
        }

        .error {
            color:#ef4444;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🔐 AI Trading Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="password" name="password" placeholder="Enter password">
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
