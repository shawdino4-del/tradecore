<!DOCTYPE html>
<html>
<head>
  <title>TradeCore Login</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #00c853;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function login(){
  fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(res => res.text())
  .then(data => {
    if(data === "success"){
      window.location.href = "/";
    } else {
      document.getElementById("msg").innerText = "Invalid login";
    }
  });
}
</script>

</body>
</html>
