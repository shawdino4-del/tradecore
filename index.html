<!DOCTYPE html>
<html>
<head>
  <title>TradeCore Dashboard</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
    }

    .status {
      color: #00c853;
      font-weight: bold;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #00c853;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>TradeCore</h2>

  <p>Bot Status: <span class="status" id="status">Loading...</span></p>

  <button onclick="startBot()">Start Bot</button>
</div>
<button onclick="startBot()">Start Bot</button>

<button onclick="logout()">Logout</button>
<script>function logout(){
  fetch('/logout').then(() => {
    window.location.href = "/";
  });
}
function startBot(){
  fetch('/start')
  .then(res => res.text())
  .then(data => {
    document.getElementById("status").innerText = data;
  });
}

fetch('/status')
.then(res => res.text())
.then(data => {
  document.getElementById("status").innerText = data;
});
</script>

</body>
</html>
